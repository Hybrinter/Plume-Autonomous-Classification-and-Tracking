[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pact-sim"
version = "0.1.0"
description = "PACT simulation environment (SIL harness, scene generation, digital twin)"
requires-python = ">=3.14"
dependencies = [
    "numpy>=1.24",
    "pact-flight",
]

[tool.hatch.build.targets.wheel]
packages = ["src/sim"]

[tool.uv.sources]
pact-flight = { workspace = true }
