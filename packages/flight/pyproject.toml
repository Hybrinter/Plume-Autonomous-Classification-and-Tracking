[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pact-flight"
version = "0.1.0"
description = "PACT flight software (lean flight image)"
requires-python = ">=3.14"
dependencies = [
    "numpy>=1.24",
    "structlog>=23.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/flight"]
