name: CI

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Ruff lint
        # Scoped to packages/ while legacy src/pact is migrated in. Widen to "." once src/pact is removed.
        run: uv run ruff check packages
      - name: Ruff format check
        run: uv run ruff format --check packages
      - name: Type check
        run: uv run mypy packages
      - name: Import layering
        run: uv run lint-imports
      - name: VCRM traceability
        run: uv run python scripts/check_vcrm.py
      - name: Tests
        # Scoped to packages/ while legacy src/pact is migrated in. Widen to the full suite
        # ("uv run pytest -m 'not e2e'") once src/pact and its tests are removed.
        # All Phase-D validation guard tests live under packages/*/tests/, so they are collected
        # here; the repo-root tests/ tree (legacy src/pact) stays out of CI until src/pact retires.
        run: uv run pytest packages -m "not e2e"
