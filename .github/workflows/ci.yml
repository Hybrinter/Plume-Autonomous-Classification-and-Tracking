name: CI

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check packages scripts
      - name: Ruff format check
        run: uv run ruff format --check packages scripts
      - name: Type check
        run: uv run mypy packages scripts
      - name: Import layering
        run: uv run lint-imports
      - name: VCRM traceability
        run: uv run python scripts/check_vcrm.py
      - name: Tests
        # The whole tree is now packages/ + scripts/ (legacy src/pact retired); testpaths scope
        # collection to packages/*/tests/.
        run: uv run pytest -m "not e2e"
