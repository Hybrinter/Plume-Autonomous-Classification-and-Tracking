# PACT default configuration
# All tunable parameters for every subsystem live here.
# No magic numbers in source code — every threshold must reference this file.
# Loaded once at startup by ops/config_loader.py into typed PactConfig dataclasses.

[controller]
confidence_gate = 0.55
ema_alpha = 0.4
min_deadband_px = 20
max_deadband_px = 250
max_deadband_strike_count = 3
retarget_rate_limit_hz = 0.5
max_slew_rate_deg_per_s = 2.0
acquire_persistence_frames = 3
release_persistence_frames = 5
scan_entry_idle_seconds = 60.0
scan_slew_rate_deg_per_s = 0.5
blob_iou_match_threshold = 0.25
min_blob_area_px = 15
# Kalman filter
kalman_dt_s = 0.1
kalman_process_noise = 0.01
kalman_measurement_noise = 0.1
# LQR controller
lqr_Q_diag = [10.0, 10.0, 1.0, 1.0]
lqr_R_diag = [1.0, 1.0]
max_slew_deg_s = 2.0
runaway_rate_tolerance_deg_per_s = 1.0
runaway_strike_count = 3

[inference]
model_path = "data/models/active.pt"
rollback_model_path = "data/models/rollback.pt"
input_bands = ["BLUE", "GREEN", "RED", "NIR"]
input_height_px = 256
input_width_px = 256
use_int8 = false
latency_budget_ms = 500.0   # TBD — update when Jetson Xavier benchmark is complete

[comms]
max_downlink_rate_bps = 5000000
max_uplink_rate_bps = 2000000
max_daily_downlink_bytes = 1073741824   # 1 GB
max_daily_uplink_bytes = 104857600      # 100 MB
comm_window_days = ["MON", "TUE", "WED", "THU", "FRI"]
ccsds_apid = 1
staged_model_path = "data/models/staged.pt"

[storage]
data_root = "data/flight"
max_storage_bytes = 107374182400   # 100 GB placeholder
checksum_algorithm = "sha256"

[preprocessing]
saturation_fraction_threshold = 0.05
nir_red_ratio_threshold = 3.0
sunglint_nir_mean_threshold = 0.6
max_motion_smear_px = 1.0

[sensor]
width_px = 1024
height_px = 1024
bit_depth = 12
mosaic_layout = ["BLUE", "GREEN", "RED", "NIR"]
# 1024 @ 0.02 deg/px keeps FOV parity with the previous 512 @ 0.04 geometry.
ifov_deg_per_px = 0.02
default_exposure_us = 1000.0
default_gain_db = 0.0
calibration_dir = ""

[fault]
watchdog_interval_s = 5.0
watchdog_max_miss_count = 3
inference_timeout_ms = 2000.0
thermal_limit_c = 80.0
power_limit_w = 55.0

[gimbal]
az_min_deg = -90.0
az_max_deg = 90.0
el_min_deg = -45.0
el_max_deg = 45.0
max_hw_slew_rate_deg_per_s = 10.0
stow_az_deg = 0.0
stow_el_deg = -45.0
home_az_deg = 0.0
home_el_deg = 0.0
sim_time_constant_s = 0.2
sim_encoder_noise_deg = 0.005
sim_seed = 0
serial_port = ""
serial_baud = 9600
counts_per_deg = 77.6
