[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pact-tools"
version = "0.1.0"
description = "PACT engineering tools (experiments, training, analysis, replay)"
requires-python = ">=3.14"
dependencies = [
    "pact-flight",
    "pact-sim",
]

[tool.hatch.build.targets.wheel]
packages = ["src/tools"]

[tool.uv.sources]
pact-flight = { workspace = true }
pact-sim = { workspace = true }
